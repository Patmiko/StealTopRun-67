<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Speedrun Tracker{% endblock %}</title>
    
    </head>
<body>

    <nav>
        <ul>
            <li><a href="{% url 'user-login' %}">Login</a></li>
            <li>
                <form action="{% url 'user-logout' %}" method="POST" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit">Logout</button>
                </form>
            </li>
        </ul>
    </nav>

    <main>
        {% block content %}
        {% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 StealTopRun</p>
    </footer>

</body>
</html>
