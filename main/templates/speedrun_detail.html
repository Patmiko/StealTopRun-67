{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto mt-8 p-6 bg-gray-800 rounded-xl border border-gray-700 text-white">
    <a href="{% url 'category-leaderboard' game_id=game.id type_id=category.id %}" class="text-gray-400 hover:text-white">&larr; Back to Leaderboard</a>
    
    <div class="flex justify-between items-start mt-4">
        <h1 class="text-3xl font-bold">{{ game.name }} - {{ category.name }}</h1>
        <div class="bg-purple-900 px-4 py-2 rounded-lg border border-purple-500">
            <span class="text-sm text-purple-200">Rank</span>
            <div class="text-2xl font-black">#{{ rank }}</div>
        </div>
    </div>

    <a href="{% url 'user-profile' username=speedrun.user.username %}" class="inline-block text-purple-400 font-semibold text-lg mb-6 hover:text-purple-300 transition underline">
        {{ speedrun.user.username }}'s Run
    </a>

    <div class="aspect-video w-full mb-6">
        <iframe 
            src="{{ speedrun.embed_url }}" 
            width="100%" 
            height="100%" 
            frameborder="0" 
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            referrerpolicy="strict-origin-when-cross-origin" 
            allowfullscreen>
        </iframe>
    </div>

    <div class="grid grid-cols-2 gap-4 p-4 bg-gray-900 rounded-lg border border-gray-700">
        <p class="text-gray-400">Time: <span class="text-green-400 font-mono text-xl font-bold">{{ speedrun.formatted_time }}</span></p>
        <p class="text-gray-400">Date: <span class="text-white">{{ speedrun.date|date:"M d, Y" }}</span></p>
    </div>
    
    <div class="mt-8 pt-6 border-t border-gray-700">
        <a href="{% url 'report-speedrun' speedrun_id=speedrun.id %}" 
           class="bg-gray-800 hover:bg-gray-900 text-red-500 border-2 border-red-600 px-5 py-2 rounded-lg font-bold transition shadow-lg">
            Report Speedrun
        </a>
    </div>
</div>
{% endblock %}
